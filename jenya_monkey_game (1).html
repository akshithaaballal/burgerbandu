<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monkeys Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }
  body {
    background: #050d08;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }
  #mainCanvas { display: block; image-rendering: pixelated; cursor: crosshair; }
  #scanline {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
    pointer-events: none; z-index: 999;
  }
</style>
</head>
<body>
<canvas id="mainCanvas" width="800" height="600"></canvas>
<div id="scanline"></div>
<script>

// ============================================================
//  IMAGE PATHS — all files must be in the same folder as this HTML
// ============================================================
const IMG_JENYA_WALK    = 'walk.PNG';         // Jenya gameplay / walking sprite
const IMG_JENYA_IDLE    = 'idle.PNG';         // Jenya idle / standing (home screen)
const IMG_JENYA_HAPPY   = 'happy.PNG';        // Jenya happy sprite (WIN screen)
const IMG_JENYA_CRYING  = 'cryjenya.PNG';     // Jenya crying sprite (LOSE screen)

const IMG_MONKEY_HAPPY  = 'bandu.PNG';        // Happy monkey (falling + WIN screen)
const IMG_MONKEY_CRYING = 'crybandu.PNG';     // Crying monkey (missed + LOSE screen)
const IMG_MONKEY_BASKET = 'basketbandu.PNG';  // Basket monkey (caught animation)
const IMG_HOME_BG = 'photo2.jpeg';
// ============================================================

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
let state = 'HOME';

function loadImg(src) {
  const img = new Image();
  img.src = src;
  return img;
}

const imgs = {
  homeBg: loadImg(IMG_HOME_BG),
  jenyaWalk:    loadImg(IMG_JENYA_WALK),
  jenyaIdle:    loadImg(IMG_JENYA_IDLE),
  jenyaHappy:   loadImg(IMG_JENYA_HAPPY),
  jenyaCrying:  loadImg(IMG_JENYA_CRYING),
  monkeyHappy:  loadImg(IMG_MONKEY_HAPPY),
  monkeyCrying: loadImg(IMG_MONKEY_CRYING),
  monkeyBasket: loadImg(IMG_MONKEY_BASKET),
};

let jenya = { x: 460, y: 520, w: 220, h: 280, speed: 5, dir: 1 };
let fallingMonkeys = [], particles = [], fireflies = [], trees = [], leaves = [], idleMonkeys = [];
let score = 0, missed = 0, timer = 60, dropTimer = 0, dropInterval = 80, speed = 2.0;
let timerInterval = null, frameCount = 0;
const MAX_MISSED = 8;

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if (e.key === 'Enter' && state === 'HOME') startGame();
});
document.addEventListener('keyup', e => keys[e.key] = false);

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) * (W / r.width);
  const y = (e.clientY - r.top)  * (H / r.height);
  startAmbient();
  if (state === 'HOME' && x > 290 && x < 510 && y > 365 && y < 415) startGame();
  if ((state === 'WIN' || state === 'LOSE') && x > 290 && x < 510 && y > 455 && y < 505) {
    state = 'HOME'; resetHome();
  }
});

function resetHome() {
  idleMonkeys = [];
  const spots = [90, 200, 330, 490, 620, 730];
  spots.forEach((x, i) => {
    idleMonkeys.push({ x, y: 400 + (i%2)*25, bob: i*1.1, scale: 0.85+Math.random()*0.25 });
  });
}

function init() {
  trees = [];
  for (let i=0;i<8;i++) trees.push({x:i*110+10, layer:0, h:155+Math.random()*55, w:50+Math.random()*28});
  for (let i=0;i<6;i++) trees.push({x:i*145+30, layer:1, h:195+Math.random()*65, w:62+Math.random()*38});
  for (let i=0;i<4;i++) trees.push({x:i*225+5,  layer:2, h:235+Math.random()*55, w:82+Math.random()*38});
  fireflies = [];
  for (let i=0;i<28;i++) fireflies.push({x:Math.random()*W, y:70+Math.random()*290, vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.3, phase:Math.random()*Math.PI*2});
  leaves = [];
  for (let i=0;i<20;i++) leaves.push({x:Math.random()*W, y:Math.random()*280, vx:(Math.random()-0.5)*0.7, vy:0.3+Math.random()*0.5, rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.04, size:5+Math.random()*6});
  resetHome();
  requestAnimationFrame(loop);
}

function startGame() {
  state = 'GAME'; score = 0; missed = 0; timer = 60; speed = 2.0;
  fallingMonkeys = []; particles = [];
  jenya.x = 355; jenya.y = 420; winSoundPlayed = false; dropTimer = 0; dropInterval = 80;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => { if (state==='GAME') { timer--; if (timer<=0) endGame(); } }, 1000);
}

function endGame() {
  clearInterval(timerInterval);
  state = score >= 15 ? 'WIN' : 'LOSE';
  particles = [];
}

function spawnMonkey() {
  fallingMonkeys.push({
    x: 80+Math.random()*(W-160), y: -90,
    vy: speed, w: 95, h: 95,
    state: 'falling', timer: 0, wobble: Math.random()*Math.PI*2
  });
}

function spawnHearts(x, y) {
  for (let i=0;i<7;i++) particles.push({x, y, vx:(Math.random()-0.5)*3.5, vy:-2.5-Math.random()*2, life:55, maxLife:55, alpha:1, size:13+Math.random()*9, char:'♥', color:'#ff6b9d'});
}

function spawnTears(x, y) {
  for (let i=0;i<4;i++) particles.push({x:x+(Math.random()-0.5)*30, y, vx:(Math.random()-0.5)*1.2, vy:0.8+Math.random()*1, life:50, maxLife:50, alpha:1, size:11, char:'💧', color:'#88ccff'});
}

// ── Audio ──────────────────────────────────────────────────
let audioCtx = null;
function getAudio() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playSound(type) {
  try {
    const ac=getAudio(), osc=ac.createOscillator(), gain=ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    if (type==='catch') {
      osc.frequency.setValueAtTime(880,ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1320,ac.currentTime+0.12);
      gain.gain.setValueAtTime(0.12,ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.22);
      osc.start(); osc.stop(ac.currentTime+0.22);
    } else {
      osc.frequency.setValueAtTime(280,ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(140,ac.currentTime+0.25);
      gain.gain.setValueAtTime(0.08,ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3);
      osc.start(); osc.stop(ac.currentTime+0.3);
    }
  } catch(e) {}
}

const winSound = new Audio('shut.mp3');
winSound.preload = 'auto';
let winSoundPlayed = false;
function playWinSound() {
  try {
    winSound.currentTime = 0;
    winSound.play().catch(() => {});
  } catch(e) {}
}

let ambientOn = false;
function startAmbient() {
  if (ambientOn) return; ambientOn = true;
  try {
    const ac=getAudio(), notes=[261.6,293.7,329.6,392,440,523.2];
    function playNote() {
      const osc=ac.createOscillator(), gain=ac.createGain();
      osc.type='sine'; osc.connect(gain); gain.connect(ac.destination);
      osc.frequency.value=notes[Math.floor(Math.random()*notes.length)];
      const t=ac.currentTime;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.032,t+0.4);
      gain.gain.linearRampToValueAtTime(0,t+1.8);
      osc.start(t); osc.stop(t+2);
      setTimeout(playNote,1600+Math.random()*2400);
    }
    playNote();
  } catch(e) {}
}

// ── Update ─────────────────────────────────────────────────
function update() {
  frameCount++;
  fireflies.forEach(f => {
    f.x += f.vx+Math.sin(frameCount*0.01+f.phase)*0.2;
    f.y += f.vy+Math.cos(frameCount*0.013+f.phase)*0.15;
    if(f.x<0) f.x=W; if(f.x>W) f.x=0;
    if(f.y<50) f.y=340; if(f.y>360) f.y=80;
  });
  leaves.forEach(l => {
    l.x+=l.vx; l.y+=l.vy; l.rot+=l.rotV;
    if(l.y>H){l.y=-10;l.x=Math.random()*W;}
    if(l.x<-10) l.x=W; if(l.x>W) l.x=-10;
  });
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life--;p.alpha=p.life/p.maxLife;});
  particles=particles.filter(p=>p.life>0);

  if (state!=='GAME') return;

  let moving=false;
  if (keys['ArrowLeft']||keys['a'])  {jenya.x-=jenya.speed; jenya.dir=-1; moving=true;}
  if (keys['ArrowRight']||keys['d']) {jenya.x+=jenya.speed; jenya.dir= 1; moving=true;}
  jenya.x=Math.max(20,Math.min(W-jenya.w-20,jenya.x));

  speed=2.0+(60-timer)*0.042;
  dropTimer++;
  if (dropTimer>=dropInterval) {
    dropTimer=0;
    dropInterval=Math.max(38,80-(60-timer)*0.65);
    spawnMonkey();
  }

  // Basket hitbox centred on Jenya's lower half
  const bx=jenya.x+jenya.w/2-40, by=jenya.y+jenya.h*0.5, bw=80, bh=40;

  fallingMonkeys.forEach(m=>{
    if(m.state!=='falling') return;
    m.y+=m.vy; m.wobble+=0.07; m.x+=Math.sin(m.wobble)*0.65;
    if(m.y+m.h>by && m.y<by+bh && m.x+m.w/2>bx && m.x+m.w/2<bx+bw) {
      m.state='caught'; m.timer=62; score++;
      spawnHearts(m.x+m.w/2, m.y); playSound('catch');
    }
    if(m.y>H-70) {
      m.state='missed'; m.y=H-90; m.timer=95; missed++;
      spawnTears(m.x+m.w/2, m.y-15); playSound('miss');
      if(missed>=MAX_MISSED) endGame();
    }
  });
  fallingMonkeys=fallingMonkeys.filter(m=>{
    if(m.state==='caught'&&--m.timer<=0) return false;
    if(m.state==='missed'&&--m.timer<=0) return false;
    return true;
  });
}

// ── Draw helpers ───────────────────────────────────────────
function drawImg(img, cx, cy, w, h, flipX=false) {
  if(!img||!img.complete||img.naturalWidth===0) return;
  ctx.save();
  ctx.translate(cx,cy);
  if(flipX) ctx.scale(-1,1);
  ctx.drawImage(img,-w/2,-h/2,w,h);
  ctx.restore();
}

function drawTree(t, alpha) {
  const cols=[['#091508','#0c1c0b'],['#0c1c0e','#102213'],['#0f2412','#142c17']];
  const[c1,c2]=cols[t.layer];
  const gy=H-60, sway=Math.sin(frameCount*0.007+t.x*0.01)*4;
  ctx.globalAlpha=alpha*(0.55+t.layer*0.18);
  ctx.fillStyle='#180e04';
  ctx.fillRect(t.x+t.w/2-t.w*0.07,gy-t.h*0.28,t.w*0.14,t.h*0.28);
  [0,1,2].forEach(i=>{
    ctx.fillStyle=i===0?c1:c2;
    ctx.globalAlpha=alpha*(0.65+t.layer*0.12);
    const lh=t.h*(0.5+i*0.08),lw=t.w*(1.1-i*0.25),ly=gy-lh-i*18;
    ctx.beginPath();
    ctx.moveTo(t.x+t.w/2+sway,ly);
    ctx.lineTo(t.x+t.w/2+lw/2+sway*0.5,ly+lh*0.65);
    ctx.lineTo(t.x+t.w/2-lw/2-sway*0.5,ly+lh*0.65);
    ctx.closePath(); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawBG(alpha=1) {
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#040c06'); sky.addColorStop(0.6,'#081508'); sky.addColorStop(1,'#0c1e10');
  ctx.fillStyle=sky; ctx.globalAlpha=alpha; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1;
  for(let i=0;i<45;i++){
    const sx=(i*113+7)%W,sy=(i*61+3)%120;
    ctx.globalAlpha=(Math.sin(frameCount*0.03+i)*0.25+0.45)*alpha*0.5;
    ctx.fillStyle='#ffffdd'; ctx.fillRect(sx,sy,1,1);
  }
  ctx.globalAlpha=1;
  trees.filter(t=>t.layer===0).forEach(t=>drawTree(t,alpha));
  fireflies.forEach(f=>{
    const p=Math.sin(frameCount*0.05+f.phase);
    ctx.globalAlpha=(0.4+p*0.4)*alpha*0.85;
    ctx.fillStyle='#b8ff70'; ctx.beginPath(); ctx.arc(f.x,f.y,2,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=(0.15+p*0.15)*alpha;
    ctx.beginPath(); ctx.arc(f.x,f.y,7,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
  trees.filter(t=>t.layer===1).forEach(t=>drawTree(t,alpha));
  leaves.forEach(l=>{
    ctx.save(); ctx.globalAlpha=0.5*alpha; ctx.translate(l.x,l.y); ctx.rotate(l.rot);
    ctx.fillStyle='#1a4822'; ctx.beginPath(); ctx.ellipse(0,0,l.size,l.size*0.45,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  trees.filter(t=>t.layer===2).forEach(t=>drawTree(t,alpha));
  ctx.fillStyle='#0b1e0e'; ctx.globalAlpha=alpha; ctx.fillRect(0,H-62,W,62);
  ctx.fillStyle='#112815'; ctx.fillRect(0,H-68,W,12); ctx.globalAlpha=1;
  const fog=ctx.createLinearGradient(0,H-180,0,H);
  fog.addColorStop(0,'rgba(15,40,20,0)'); fog.addColorStop(1,'rgba(8,20,12,0.5)');
  ctx.fillStyle=fog; ctx.globalAlpha=alpha; ctx.fillRect(0,H-180,W,180); ctx.globalAlpha=1;
}

function drawParticles() {
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color||'#ff6b9d';
    ctx.font=p.size+'px monospace'; ctx.textAlign='center';
    ctx.fillText(p.char,p.x,p.y);
    ctx.restore();
  });
}

function drawHUD() {
  ctx.fillStyle='rgba(0,0,0,0.68)'; ctx.fillRect(0,0,W,40);
  ctx.strokeStyle='rgba(80,180,80,0.25)'; ctx.lineWidth=1; ctx.strokeRect(0,39,W,1);
  ctx.fillStyle='#7dff8a'; ctx.font='9px "Press Start 2P"'; ctx.textAlign='left';
  ctx.fillText('CAUGHT: '+score,12,26);
  ctx.fillStyle=missed>=MAX_MISSED-3?'#ff6666':'#ffaaaa';
  ctx.textAlign='center'; ctx.fillText('MISSED: '+missed+'/'+MAX_MISSED,W/2,26);
  ctx.fillStyle=timer<10?'#ff5555':'#ffd87d';
  ctx.textAlign='right'; ctx.fillText('TIME: '+timer+'s',W-12,26);
}

function btnPulse(x,y,w,h,r,g,b,label,col) {
  const p=Math.sin(frameCount*0.07)*0.12+0.88;
  ctx.fillStyle=`rgba(${r},${g},${b},${p})`; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.strokeRect(x,y,w,h);
  ctx.fillStyle=col; ctx.font='11px "Press Start 2P"'; ctx.textAlign='center';
  ctx.fillText(label,x+w/2,y+h/2+4);
}
function roundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();

  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}
// ── HOME ───────────────────────────────────────────────────
function drawHome() {
  drawBG();

  // Soft dark overlay
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.fillRect(0, 0, W, H);

  // Loading bar
  ctx.strokeStyle = '#1f56aa';
  ctx.lineWidth = 4;
  ctx.strokeRect(250, 25, 300, 28);

  ctx.fillStyle = '#1f56aa';
  for (let i = 0; i < 13; i++) {
    ctx.fillRect(258 + i * 20, 31, 14, 16);
  }

  ctx.fillStyle = '#1f56aa';
  ctx.font = '18px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('LOADING...', W / 2, 85);

  // Main window
  ctx.fillStyle = '#1f56aa';
  roundRect(45, 125, 710, 425, 22, true, false);

  // Home image inside the blue window
  if (imgs.homeBg.complete && imgs.homeBg.naturalWidth !== 0) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(65, 190, 670, 330);
    ctx.clip();
    ctx.drawImage(imgs.homeBg, 65, 190, 670, 330);
    ctx.restore();
  }

  ctx.fillStyle = '#ffffff';
  ctx.font = '17px "Press Start 2P"';
  ctx.textAlign = 'left';
  ctx.fillText('BANDU.EXE', 75, 165);

  // Inner image area border
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(65, 190, 670, 330);

  // Start button
  ctx.fillStyle = '#ffffff';
  ctx.font = '19px "Press Start 2P"';
  ctx.textAlign = 'center';
  btnPulse(290, 385, 220, 46, 91, 143, 58, 'START', '#ffffff');

  // Warning pop-up
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(70, 415, 255, 95);

  ctx.strokeStyle = '#1f56aa';
  ctx.lineWidth = 6;
  ctx.strokeRect(70, 415, 255, 95);

  ctx.fillStyle = '#1f56aa';
  ctx.fillRect(70, 415, 255, 28);

  ctx.fillStyle = '#ffffff';
  ctx.font = '10px "Press Start 2P"';
  ctx.textAlign = 'left';
  ctx.fillText('WARNING', 86, 435);

  ctx.fillStyle = '#1f56aa';
  ctx.font = '10px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('DO YOU WANT', 198, 465);
  ctx.fillText('TO COLLECT?', 198, 485);

  ctx.fillStyle = '#e9e9e9';
  ctx.fillRect(95, 492, 85, 22);
  ctx.fillRect(195, 492, 85, 22);

  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.strokeRect(95, 492, 85, 22);
  ctx.strokeRect(195, 492, 85, 22);

  ctx.fillStyle = '#333';
  ctx.font = '7px "Press Start 2P"';
  ctx.fillText('Yes', 137, 507);
  ctx.fillText('No', 237, 507);

  // Decorative monkeys
  idleMonkeys.forEach(m => {
    const b = Math.sin(frameCount * 0.04 + m.bob) * 5;
    drawImg(imgs.monkeyHappy, m.x, m.y + b, 85, 85);
  });

  ctx.fillStyle = '#ffffff';
  ctx.font = '8px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('CLICK START', W / 2, 570);
}

// ── GAME ───────────────────────────────────────────────────
function drawGame() {
  const darkF=missed>=MAX_MISSED-3?Math.max(0.48,1-(missed-MAX_MISSED+4)*0.13):1;
  drawBG(darkF);

  // crybandu.PNG — crying monkey sitting on ground when missed
  fallingMonkeys.filter(m=>m.state==='missed').forEach(m=>{
    ctx.globalAlpha=m.timer/95;
    drawImg(imgs.monkeyCrying, m.x+m.w/2, m.y+m.h/2, m.w, m.h);
    ctx.globalAlpha=1;
  });

  // bandu.PNG — happy monkey falling from trees
  fallingMonkeys.filter(m=>m.state==='falling').forEach(m=>{
    drawImg(imgs.monkeyHappy, m.x+m.w/2, m.y+m.h/2, m.w, m.h);
  });

  // walk.PNG — Jenya moving left/right
  drawImg(imgs.jenyaWalk, jenya.x+jenya.w/2, jenya.y+jenya.h/2, jenya.w, jenya.h, jenya.dir===-1);

  // basketbandu.PNG — monkey inside basket when caught
  fallingMonkeys.filter(m=>m.state==='caught').forEach(m=>{
    ctx.globalAlpha=m.timer/62;
    const sc=1+(1-m.timer/62)*0.18;
    drawImg(imgs.monkeyBasket, jenya.x+jenya.w/2, jenya.y+jenya.h*0.42, m.w*0.78*sc, m.h*0.78*sc);
    ctx.globalAlpha=1;
  });

  drawParticles();
  drawHUD();

  if(missed>=MAX_MISSED-3){
    ctx.globalAlpha=Math.sin(frameCount*0.15)*0.35+0.65;
    ctx.fillStyle='#ff5555'; ctx.font='8px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText('! MONKEYS ESCAPING !',W/2,56); ctx.globalAlpha=1;
  }
}

// ── WIN ────────────────────────────────────────────────────
function drawWin() {
  drawBG(0.88);
  ctx.fillStyle='rgba(15,45,12,0.58)'; ctx.fillRect(0,0,W,H);

  ctx.shadowColor='#ffd87d'; ctx.shadowBlur=24;
  ctx.fillStyle='#ffd87d'; ctx.font='20px "Press Start 2P"'; ctx.textAlign='center';
  ctx.fillText('CONGRATS!', W/2, 52);
  ctx.shadowBlur=0;
  ctx.fillStyle='#c8ffcc'; ctx.font='8px "Press Start 2P"';
  ctx.fillText('JENYA HAS HER MONKEY FAMILY!', W/2, 76);
  ctx.fillText('YOU CAUGHT '+score+' MONKEYS!', W/2, 95);

  // bandu.PNG — 26 large happy monkeys filling the screen
  const winPos=[
    {x:70, y:178,s:155},{x:215,y:162,s:158},{x:368,y:156,s:162},{x:522,y:162,s:158},{x:665,y:178,s:150},

// ── Loop ───────────────────────────────────────────────────
function loop() {
  update();
  ctx.clearRect(0,0,W,H);
  if      (state==='HOME') drawHome();
  else if (state==='GAME') drawGame();
  else if (state==='WIN')  drawWin();
  else                     drawLose();
  requestAnimationFrame(loop);
}
