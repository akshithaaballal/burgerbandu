<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Monkeys Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #050d08;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
    touch-action: none;
  }

  /* ── Game wrapper: dark retro backdrop, centers + scales the canvas ── */
  #gameWrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse at center, #0a1810 0%, #050d08 60%, #020503 100%);
    overflow: hidden;
  }
  /* subtle CRT texture on the surrounding dark backdrop (not the game itself) */
  #gameWrap::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    pointer-events: none;
  }

  #mainCanvas {
    display: block;
    image-rendering: pixelated;
    cursor: crosshair;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
  }

  #scanline {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
    pointer-events: none; z-index: 999;
  }

  /* ── Loading screen ───────────────────────────────────────── */
  #loadingScreen {
    position: fixed; inset: 0; z-index: 2000;
    background: #050d08;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #7dff8a; text-align: center; padding: 20px;
  }
  #loadingScreen .title { font-size: clamp(12px, 3vw, 20px); margin-bottom: 28px; color: #ffd87d; }
  #loadingBarOuter { width: min(80vw, 420px); height: 22px; border: 3px solid #1f56aa; padding: 3px; }
  #loadingBarInner { height: 100%; width: 0%; background: #1f56aa; transition: width 0.15s ease-out; }
  #loadingPercent { margin-top: 16px; font-size: clamp(10px, 2.4vw, 14px); color: #ffffff; }

  /* ── Touch controls (mobile) ─────────────────────────────── */
  .touchBtn {
    position: fixed;
    bottom: max(28px, env(safe-area-inset-bottom));
    width: clamp(64px, 16vw, 96px);
    height: clamp(64px, 16vw, 96px);
    border-radius: 50%;
    background: rgba(255,255,255,0.14);
    border: 3px solid rgba(255,255,255,0.4);
    display: none;
    align-items: center; justify-content: center;
    font-size: clamp(22px, 5vw, 34px);
    color: #fff;
    user-select: none;
    z-index: 800;
  }
  .touchBtn.active { background: rgba(255,255,255,0.32); }
  #touchLeft { left: max(20px, env(safe-area-inset-left)); }
  #touchRight { right: max(20px, env(safe-area-inset-right)); }
  body.touch-controls.state-GAME .touchBtn { display: flex; }

  /* ── Orientation overlay ──────────────────────────────────── */
  #orientationOverlay {
    position: fixed; inset: 0; z-index: 1500;
    background: rgba(2,5,3,0.95);
    display: none;
    flex-direction: column; align-items: center; justify-content: center;
    text-align: center; color: #fff; padding: 30px;
  }
  #orientationOverlay .rotateIcon { font-size: 48px; margin-bottom: 20px; }
  #orientationOverlay p { font-size: clamp(11px,3vw,15px); line-height: 1.8; max-width: 320px; margin-bottom: 26px; }
  #orientationOverlay button {
    font-family: 'Press Start 2P', monospace; font-size: 10px;
    background: #1f56aa; color: #fff; border: 2px solid #7dff8a;
    padding: 12px 18px; cursor: pointer;
  }
  @media (max-width: 920px) and (orientation: portrait) {
    body.show-orientation-warning #orientationOverlay { display: flex; }
  }

  /* ── Older Games overlay ──────────────────────────────────── */
  #olderGamesOverlay {
    position: fixed; inset: 0; z-index: 1800;
    background: rgba(4,10,6,0.97);
    display: none;
    flex-direction: column; align-items: center; justify-content: center;
    color: #fff; padding: 20px;
  }
  #olderGamesOverlay.open { display: flex; }
  #olderGamesTitle {
    font-size: clamp(14px, 3.6vw, 24px); color: #ff6b9d; margin-bottom: 26px;
    text-align: center; text-shadow: 0 0 18px rgba(255,107,157,0.6);
  }
  #carouselContainer {
    position: relative;
    width: min(90vw, 640px);
    height: min(60vh, 420px);
    overflow: hidden;
    border: 4px solid #1f56aa;
    background: #020603;
    touch-action: pan-y;
  }
  #carouselTrack {
    display: flex; height: 100%;
    transition: transform 0.5s ease;
  }
  #carouselTrack .slide {
    min-width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: #020603;
  }
  #carouselTrack .slide img {
    max-width: 100%; max-height: 100%; object-fit: contain;
    image-rendering: auto;
  }
  #carouselTrack .slide .placeholder {
    font-size: 10px; color: #557; text-align: center; padding: 20px; line-height: 1.8;
  }
  .carouselArrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(31,86,170,0.75); color: #fff; border: 2px solid #fff;
    width: 44px; height: 44px; border-radius: 50%;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
  }
  #carouselPrev { left: 10px; }
  #carouselNext { right: 10px; }
  #carouselTagline {
    margin-top: 18px;
    font-size: clamp(9px, 2.2vw, 13px);
    color: #ffd87d;
    text-align: center;
    max-width: min(90vw, 640px);
    line-height: 1.8;
    text-shadow: 0 0 10px rgba(255,216,125,0.4);
  }
  #closeOlderGames {
    margin-top: 26px;
    font-family: 'Press Start 2P', monospace; font-size: 11px;
    background: #651616; color: #ff9999; border: 2px solid #ff9999;
    padding: 12px 22px; cursor: pointer;
  }
</style>
</head>
<body>

<div id="gameWrap">
  <canvas id="mainCanvas" width="800" height="600"></canvas>
</div>
<div id="scanline"></div>

<!-- ============================================================
     LOADING SCREEN — shown until every image & sound is ready
============================================================ -->
<div id="loadingScreen">
  <div class="title">LOADING BANDU.EXE</div>
  <div id="loadingBarOuter"><div id="loadingBarInner"></div></div>
  <div id="loadingPercent">0%</div>
</div>

<!-- ============================================================
     ORIENTATION WARNING — portrait mode on small/mobile screens
============================================================ -->
<div id="orientationOverlay">
  <div class="rotateIcon">🔄</div>
  <p>Rotate your phone for the best experience.</p>
  <button id="continueAnywayBtn">CONTINUE ANYWAY</button>
</div>

<!-- ============================================================
     TOUCH CONTROLS — large semi-transparent left/right buttons
============================================================ -->
<div class="touchBtn" id="touchLeft">◀</div>
<div class="touchBtn" id="touchRight">▶</div>

<!-- ============================================================
     OLDER GAMES OVERLAY — image carousel of memories
============================================================ -->
<div id="olderGamesOverlay">
  <div id="olderGamesTitle">Always Been A Winner ❤️</div>
  <div id="carouselContainer">
    <div id="carouselTrack"><!-- slides injected by JS --></div>
    <div class="carouselArrow" id="carouselPrev">&#10094;</div>
    <div class="carouselArrow" id="carouselNext">&#10095;</div>
  </div>
  <!-- Tagline shown underneath the carousel — edit this freely -->
  <div id="carouselTagline">Every single one, a reason to smile.</div>
  <button id="closeOlderGames">CLOSE</button>
</div>

<script>

// ============================================================
//  IMAGE PATHS — all files must be in the same folder as this HTML
// ============================================================
const IMG_JENYA_WALK    = 'walk.PNG';         // Jenya gameplay / walking sprite
const IMG_JENYA_IDLE    = 'idle.PNG';         // Jenya idle / standing (home screen)
const IMG_JENYA_HAPPY   = 'happy.PNG';        // Jenya happy sprite (WIN screen)
const IMG_JENYA_CRYING  = 'cryjenya.PNG';     // Jenya crying sprite (LOSE screen)

const IMG_MONKEY_HAPPY  = 'bandu.PNG';        // Happy monkey (falling + WIN screen)
const IMG_MONKEY_CRYING = 'crybandu.PNG';     // Crying monkey (missed + LOSE screen)
const IMG_MONKEY_BASKET = 'basketbandu.PNG';  // Basket monkey (caught animation)
const IMG_HOME_BG = 'photo2.jpeg';
// ============================================================

// ============================================================
//  "OLDER GAMES" MEMORY CAROUSEL — put your own image filenames here.
//  Drop the image files in the same folder as this HTML file.
//  You can add as many as you like — the carousel handles any amount.
// ============================================================
const memories = [
    "memory1.jpeg",
    "memory2.jpeg",
    "memory3.jpeg",
    "memory4.jpeg",
    "memory5.jpeg",
    "memory6.jpeg",
    "memory7.jpeg",
    "memory8.jpeg",
    "memory9.jpeg",
    "memory10.jpeg",
    "memory11.jpeg",
    "memory12.jpeg"
];

// ============================================================
//  TAGLINES — one line of text per picture above, shown under the
//  carousel and changes automatically as the slide changes.
//  >>> EDIT THE TEXT BELOW <<<
//  Each tagline lines up with the image in "memories" at the same
//  position (taglines[0] goes with memories[0], and so on).
//  If you add/remove pictures above, add/remove a matching line here.
//  If a tagline is missing for a picture, a default line is used instead.
// ============================================================
const taglines = [
    "Team player",   // goes with memories[0]
    "Presidency, Marketing",              // goes with memories[1]
    "NSB, Marketing",       // goes with memories[2]
    "Marketing, MES (made mumma proud)",                        // goes with memories[3]
    "JNC",            // goes with memories[4]
    "Prodigy event head, marketing",   // goes with memories[5]
    "OVERALLS",                // goes with memories[6]
    "St. Claret OVERALLS",        // goes with memories[7]
    "OVERALLS again",        // goes with memories[8]
    "Event head, EDP",               // goes with memories[9]
    "Marketing coordinator.",                  // goes with memories[10]
    "Last but not the least, best daughter and a best friend.",                // goes with memories[11]
];
// Default tagline used if "taglines" has fewer entries than "memories"
const DEFAULT_TAGLINE = "Always been a winner ❤️";
// ============================================================

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
let state = 'HOME';
let overlayOpen = false; // true while the Older Games overlay (or similar) is open — pauses the game loop

// ── Asset loading / preloading ──────────────────────────────
let assetsTotal = 0, assetsLoaded = 0;
function updateLoadingUI() {
  const pct = assetsTotal === 0 ? 100 : Math.round((assetsLoaded / assetsTotal) * 100);
  const bar = document.getElementById('loadingBarInner');
  const txt = document.getElementById('loadingPercent');
  if (bar) bar.style.width = pct + '%';
  if (txt) txt.textContent = pct + '%';
  if (assetsLoaded >= assetsTotal) {
    const ls = document.getElementById('loadingScreen');
    if (ls) ls.style.display = 'none';
  }
}

function loadImg(src) {
  assetsTotal++;
  const img = new Image();
  img.onload = () => { assetsLoaded++; updateLoadingUI(); };
  img.onerror = () => { assetsLoaded++; updateLoadingUI(); }; // count errors too so loading never hangs
  img.src = src;
  return img;
}

const imgs = {
  homeBg: loadImg(IMG_HOME_BG),
  jenyaWalk:    loadImg(IMG_JENYA_WALK),
  jenyaIdle:    loadImg(IMG_JENYA_IDLE),
  jenyaHappy:   loadImg(IMG_JENYA_HAPPY),
  jenyaCrying:  loadImg(IMG_JENYA_CRYING),
  monkeyHappy:  loadImg(IMG_MONKEY_HAPPY),
  monkeyCrying: loadImg(IMG_MONKEY_CRYING),
  monkeyBasket: loadImg(IMG_MONKEY_BASKET),
};

let jenya = { x: 460, y: 520, w: 220, h: 280, speed: 5, dir: 1, vx: 0 };
let fallingMonkeys = [], particles = [], fireflies = [], trees = [], leaves = [], idleMonkeys = [];
let score = 0, missed = 0, timer = 60, dropTimer = 0, dropInterval = 80, speed = 2.0;
let timerInterval = null, frameCount = 0;
const MAX_MISSED = 8;

// Vertical offset that re-centers the Home Screen window in the canvas
const HOME_DY = -37;

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if (e.key === 'Enter' && state === 'HOME') startGame();
});
document.addEventListener('keyup', e => keys[e.key] = false);

function setBodyState(s) {
  document.body.classList.remove('state-HOME','state-GAME','state-WIN','state-LOSE');
  document.body.classList.add('state-' + s);
}

canvas.addEventListener('click', e => {
  if (assetsLoaded < assetsTotal) return; // ignore clicks until fully loaded
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) * (W / r.width);
  const y = (e.clientY - r.top)  * (H / r.height);
  startAmbient();
  if (state === 'HOME' && x > 290 && x < 510 && y > 365 + HOME_DY && y < 415 + HOME_DY) startGame();
  if (state === 'WIN' && x > 290 && x < 510 && y > 505 && y < 545) openOlderGames();
  if ((state === 'WIN' || state === 'LOSE') && x > 290 && x < 510 && y > 455 && y < 505) {
    playAgain();
  }
});

// ── Play Again / reset (also stops the victory music) ───────
function playAgain() {
  // Stop the win sound completely so it never overlaps with future plays
  try {
    winSound.pause();
    winSound.currentTime = 0;
  } catch (e) {}
  winSoundPlayed = false;
  state = 'HOME';
  resetHome();
}

function resetHome() {
  idleMonkeys = [];
  const spots = [90, 200, 330, 490, 620, 730];
  spots.forEach((x, i) => {
    idleMonkeys.push({ x, y: 400 + (i%2)*25, bob: i*1.1, scale: 0.85+Math.random()*0.25 });
  });
}

function init() {
  trees = [];
  for (let i=0;i<8;i++) trees.push({x:i*110+10, layer:0, h:155+Math.random()*55, w:50+Math.random()*28});
  for (let i=0;i<6;i++) trees.push({x:i*145+30, layer:1, h:195+Math.random()*65, w:62+Math.random()*38});
  for (let i=0;i<4;i++) trees.push({x:i*225+5,  layer:2, h:235+Math.random()*55, w:82+Math.random()*38});
  fireflies = [];
  for (let i=0;i<28;i++) fireflies.push({x:Math.random()*W, y:70+Math.random()*290, vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.3, phase:Math.random()*Math.PI*2});
  leaves = [];
  for (let i=0;i<20;i++) leaves.push({x:Math.random()*W, y:Math.random()*280, vx:(Math.random()-0.5)*0.7, vy:0.3+Math.random()*0.5, rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.04, size:5+Math.random()*6});
  resetHome();
  buildGradients();
  setupCarousel();
  setupTouchControls();
  setupOrientationHandling();
  setupResize();
  requestAnimationFrame(loop);
}

function startGame() {
  state = 'GAME'; setBodyState('GAME'); score = 0; missed = 0; timer = 60; speed = 2.0;
  fallingMonkeys = []; particles = [];
  jenya.x = 355; jenya.y = 420; winSoundPlayed = false; dropTimer = 0; dropInterval = 80;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => { if (state==='GAME') { timer--; if (timer<=0) endGame(); } }, 1000);
}

function endGame() {
  clearInterval(timerInterval);
  state = score >= 15 ? 'WIN' : 'LOSE';
  setBodyState(state);
  particles = [];
}

function spawnMonkey() {
  fallingMonkeys.push({
    x: 80+Math.random()*(W-160), y: -90,
    vy: speed, w: 95, h: 95,
    state: 'falling', timer: 0, wobble: Math.random()*Math.PI*2
  });
}

function spawnHearts(x, y) {
  for (let i=0;i<7;i++) particles.push({x, y, vx:(Math.random()-0.5)*3.5, vy:-2.5-Math.random()*2, life:55, maxLife:55, alpha:1, size:13+Math.random()*9, char:'♥', color:'#ff6b9d'});
}

function spawnTears(x, y) {
  for (let i=0;i<4;i++) particles.push({x:x+(Math.random()-0.5)*30, y, vx:(Math.random()-0.5)*1.2, vy:0.8+Math.random()*1, life:50, maxLife:50, alpha:1, size:11, char:'💧', color:'#88ccff'});
}

// ── Audio ──────────────────────────────────────────────────
let audioCtx = null;
function getAudio() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playSound(type) {
  try {
    const ac=getAudio(), osc=ac.createOscillator(), gain=ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    if (type==='catch') {
      osc.frequency.setValueAtTime(880,ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1320,ac.currentTime+0.12);
      gain.gain.setValueAtTime(0.12,ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.22);
      osc.start(); osc.stop(ac.currentTime+0.22);
    } else {
      osc.frequency.setValueAtTime(280,ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(140,ac.currentTime+0.25);
      gain.gain.setValueAtTime(0.08,ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3);
      osc.start(); osc.stop(ac.currentTime+0.3);
    }
  } catch(e) {}
}

// shut.mp3 — victory music. Stopped/reset every time Play Again is clicked (see playAgain()).
const winSound = new Audio('Shut.mp3');
winSound.preload = 'auto';
assetsTotal++;
let winSoundAssetCounted = false;
function countWinSoundAsset() {
  if (winSoundAssetCounted) return;
  winSoundAssetCounted = true;
  assetsLoaded++; updateLoadingUI();
}
winSound.addEventListener('canplaythrough', countWinSoundAsset, { once: true });
winSound.addEventListener('error', countWinSoundAsset, { once: true });
// Safety net in case canplaythrough never fires (e.g. file missing) — don't block loading forever
setTimeout(countWinSoundAsset, 4000);

let winSoundPlayed = false;
function playWinSound() {
  try {
    winSound.pause();
    winSound.currentTime = 0;
    winSound.play().catch(() => {});
  } catch(e) {}
}

let ambientOn = false;
function startAmbient() {
  if (ambientOn) return; ambientOn = true;
  try {
    const ac=getAudio(), notes=[261.6,293.7,329.6,392,440,523.2];
    function playNote() {
      if (overlayOpen) { setTimeout(playNote, 1600); return; } // pause ambient while an overlay is open
      const osc=ac.createOscillator(), gain=ac.createGain();
      osc.type='sine'; osc.connect(gain); gain.connect(ac.destination);
      osc.frequency.value=notes[Math.floor(Math.random()*notes.length)];
      const t=ac.currentTime;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.032,t+0.4);
      gain.gain.linearRampToValueAtTime(0,t+1.8);
      osc.start(t); osc.stop(t+2);
      setTimeout(playNote,1600+Math.random()*2400);
    }
    playNote();
  } catch(e) {}
}

// ── Update ─────────────────────────────────────────────────
function update() {
  frameCount++;
  fireflies.forEach(f => {
    f.x += f.vx+Math.sin(frameCount*0.01+f.phase)*0.2;
    f.y += f.vy+Math.cos(frameCount*0.013+f.phase)*0.15;
    if(f.x<0) f.x=W; if(f.x>W) f.x=0;
    if(f.y<50) f.y=340; if(f.y>360) f.y=80;
  });
  leaves.forEach(l => {
    l.x+=l.vx; l.y+=l.vy; l.rot+=l.rotV;
    if(l.y>H){l.y=-10;l.x=Math.random()*W;}
    if(l.x<-10) l.x=W; if(l.x>W) l.x=-10;
  });
  // Particle update — in-place mutation, filtered once (no per-frame object churn beyond what's needed)
  for (let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life--;p.alpha=p.life/p.maxLife;
    if (p.life<=0) particles.splice(i,1);
  }

  if (state!=='GAME') return;

  let moving=false;
  let targetVX = 0;
  if (keys['ArrowLeft']||keys['a']||touchState.left)  {targetVX=-jenya.speed; jenya.dir=-1; moving=true;}
  if (keys['ArrowRight']||keys['d']||touchState.right) {targetVX= jenya.speed; jenya.dir= 1; moving=true;}
  // Smooth acceleration/deceleration for nicer movement feel (same max speed/rules as before)
  jenya.vx += (targetVX - jenya.vx) * 0.4;
  jenya.x += jenya.vx;
  jenya.x=Math.max(20,Math.min(W-jenya.w-20,jenya.x));

  speed=2.0+(60-timer)*0.042;
  dropTimer++;
  if (dropTimer>=dropInterval) {
    dropTimer=0;
    dropInterval=Math.max(38,80-(60-timer)*0.65);
    spawnMonkey();
  }

  // Basket hitbox centred on Jenya's lower half
  const bx=jenya.x+jenya.w/2-40, by=jenya.y+jenya.h*0.5, bw=80, bh=40;

  fallingMonkeys.forEach(m=>{
    if(m.state!=='falling') return;
    m.y+=m.vy; m.wobble+=0.07; m.x+=Math.sin(m.wobble)*0.65;
    if(m.y+m.h>by && m.y<by+bh && m.x+m.w/2>bx && m.x+m.w/2<bx+bw) {
      m.state='caught'; m.timer=62; score++;
      spawnHearts(m.x+m.w/2, m.y); playSound('catch');
    }
    if(m.y>H-70) {
      m.state='missed'; m.y=H-90; m.timer=95; missed++;
      spawnTears(m.x+m.w/2, m.y-15); playSound('miss');
      if(missed>=MAX_MISSED) endGame();
    }
  });
  fallingMonkeys=fallingMonkeys.filter(m=>{
    if(m.state==='caught'&&--m.timer<=0) return false;
    if(m.state==='missed'&&--m.timer<=0) return false;
    return true;
  });
}

// ── Draw helpers ───────────────────────────────────────────
function drawImg(img, cx, cy, w, h, flipX=false) {
  if(!img||!img.complete||img.naturalWidth===0) return;
  ctx.save();
  ctx.translate(cx,cy);
  if(flipX) ctx.scale(-1,1);
  ctx.drawImage(img,-w/2,-h/2,w,h);
  ctx.restore();
}

const treeColors=[['#091508','#0c1c0b'],['#0c1c0e','#102213'],['#0f2412','#142c17']];
function drawTree(t, alpha) {
  const[c1,c2]=treeColors[t.layer];
  const gy=H-60, sway=Math.sin(frameCount*0.007+t.x*0.01)*4;
  ctx.globalAlpha=alpha*(0.55+t.layer*0.18);
  ctx.fillStyle='#180e04';
  ctx.fillRect(t.x+t.w/2-t.w*0.07,gy-t.h*0.28,t.w*0.14,t.h*0.28);
  [0,1,2].forEach(i=>{
    ctx.fillStyle=i===0?c1:c2;
    ctx.globalAlpha=alpha*(0.65+t.layer*0.12);
    const lh=t.h*(0.5+i*0.08),lw=t.w*(1.1-i*0.25),ly=gy-lh-i*18;
    ctx.beginPath();
    ctx.moveTo(t.x+t.w/2+sway,ly);
    ctx.lineTo(t.x+t.w/2+lw/2+sway*0.5,ly+lh*0.65);
    ctx.lineTo(t.x+t.w/2-lw/2-sway*0.5,ly+lh*0.65);
    ctx.closePath(); ctx.fill();
  });
  ctx.globalAlpha=1;
}

// ── Cached gradients (built once instead of every frame) ────
let skyGradient = null, fogGradient = null, homeBgGradient = null;
function buildGradients() {
  skyGradient=ctx.createLinearGradient(0,0,0,H);
  skyGradient.addColorStop(0,'#040c06'); skyGradient.addColorStop(0.6,'#081508'); skyGradient.addColorStop(1,'#0c1e10');

  fogGradient=ctx.createLinearGradient(0,H-180,0,H);
  fogGradient.addColorStop(0,'rgba(15,40,20,0)'); fogGradient.addColorStop(1,'rgba(8,20,12,0.5)');

  homeBgGradient=ctx.createRadialGradient(W/2,H/2,40,W/2,H/2,560);
  homeBgGradient.addColorStop(0,'#0a1c12');
  homeBgGradient.addColorStop(0.6,'#061309');
  homeBgGradient.addColorStop(1,'#020a05');
}

// Pre-rendered starfield positions (computed once, not every frame)
const starField = [];
for (let i=0;i<45;i++) starField.push({x:(i*113+7)%W, y:(i*61+3)%120});

function drawBG(alpha=1) {
  ctx.fillStyle=skyGradient; ctx.globalAlpha=alpha; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1;
  ctx.fillStyle='#ffffdd';
  for(let i=0;i<starField.length;i++){
    const s=starField[i];
    ctx.globalAlpha=(Math.sin(frameCount*0.03+i)*0.25+0.45)*alpha*0.5;
    ctx.fillRect(s.x,s.y,1,1);
  }
  ctx.globalAlpha=1;
  trees.filter(t=>t.layer===0).forEach(t=>drawTree(t,alpha));
  fireflies.forEach(f=>{
    const p=Math.sin(frameCount*0.05+f.phase);
    ctx.globalAlpha=(0.4+p*0.4)*alpha*0.85;
    ctx.fillStyle='#b8ff70'; ctx.beginPath(); ctx.arc(f.x,f.y,2,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=(0.15+p*0.15)*alpha;
    ctx.beginPath(); ctx.arc(f.x,f.y,7,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
  trees.filter(t=>t.layer===1).forEach(t=>drawTree(t,alpha));
  leaves.forEach(l=>{
    ctx.save(); ctx.globalAlpha=0.5*alpha; ctx.translate(l.x,l.y); ctx.rotate(l.rot);
    ctx.fillStyle='#1a4822'; ctx.beginPath(); ctx.ellipse(0,0,l.size,l.size*0.45,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  trees.filter(t=>t.layer===2).forEach(t=>drawTree(t,alpha));
  ctx.fillStyle='#0b1e0e'; ctx.globalAlpha=alpha; ctx.fillRect(0,H-62,W,62);
  ctx.fillStyle='#112815'; ctx.fillRect(0,H-68,W,12); ctx.globalAlpha=1;
  ctx.fillStyle=fogGradient; ctx.globalAlpha=alpha; ctx.fillRect(0,H-180,W,180); ctx.globalAlpha=1;
}

// Dark retro background used exclusively behind the Home Screen window
// (replaces the forest scene so the menu reads as a standalone computer window)
function drawHomeBackground() {
  ctx.fillStyle = homeBgGradient;
  ctx.fillRect(0,0,W,H);
  // faint CRT scanline texture, cheap (drawn with low alpha rectangles)
  ctx.globalAlpha = 0.05;
  ctx.fillStyle = '#7dff8a';
  for (let y=0; y<H; y+=4) ctx.fillRect(0,y,W,1);
  ctx.globalAlpha = 1;
}

function drawParticles() {
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color||'#ff6b9d';
    ctx.font=p.size+'px monospace'; ctx.textAlign='center';
    ctx.fillText(p.char,p.x,p.y);
    ctx.restore();
  });
}

function drawHUD() {
  ctx.fillStyle='rgba(0,0,0,0.68)'; ctx.fillRect(0,0,W,40);
  ctx.strokeStyle='rgba(80,180,80,0.25)'; ctx.lineWidth=1; ctx.strokeRect(0,39,W,1);
  ctx.fillStyle='#7dff8a'; ctx.font='9px "Press Start 2P"'; ctx.textAlign='left';
  ctx.fillText('CAUGHT: '+score,12,26);
  ctx.fillStyle=missed>=MAX_MISSED-3?'#ff6666':'#ffaaaa';

  ctx.fillStyle=timer<10?'#ff5555':'#ffd87d';
  ctx.textAlign='right'; ctx.fillText('TIME: '+timer+'s',W-12,26);
}

function btnPulse(x,y,w,h,r,g,b,label,col) {
  const p=Math.sin(frameCount*0.07)*0.12+0.88;
  ctx.fillStyle=`rgba(${r},${g},${b},${p})`; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.strokeRect(x,y,w,h);
  ctx.fillStyle=col; ctx.font='11px "Press Start 2P"'; ctx.textAlign='center';
  ctx.fillText(label,x+w/2,y+h/2+4);
}
function roundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();

  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

// ── GAME ───────────────────────────────────────────────────
function drawGame() {
  const darkF=missed>=MAX_MISSED-3?Math.max(0.48,1-(missed-MAX_MISSED+4)*0.13):1;
  drawBG(darkF);

  // crybandu.PNG — crying monkey sitting on ground when missed
  fallingMonkeys.filter(m=>m.state==='missed').forEach(m=>{
    ctx.globalAlpha=m.timer/95;
    drawImg(imgs.monkeyCrying, m.x+m.w/2, m.y+m.h/2, m.w, m.h);
    ctx.globalAlpha=1;
  });

  // bandu.PNG — happy monkey falling from trees
  fallingMonkeys.filter(m=>m.state==='falling').forEach(m=>{
    drawImg(imgs.monkeyHappy, m.x+m.w/2, m.y+m.h/2, m.w, m.h);
  });

  // walk.PNG — Jenya moving left/right
  drawImg(imgs.jenyaWalk, jenya.x+jenya.w/2, jenya.y+jenya.h/2, jenya.w, jenya.h, jenya.dir===-1);

  // basketbandu.PNG — monkey inside basket when caught
  fallingMonkeys.filter(m=>m.state==='caught').forEach(m=>{
    ctx.globalAlpha=m.timer/62;
    const sc=1+(1-m.timer/62)*0.18;
    drawImg(imgs.monkeyBasket, jenya.x+jenya.w/2, jenya.y+jenya.h*0.42, m.w*0.78*sc, m.h*0.78*sc);
    ctx.globalAlpha=1;
  });

  drawParticles();
  drawHUD();

  if(missed>=MAX_MISSED-3){
    ctx.globalAlpha=Math.sin(frameCount*0.15)*0.35+0.65;
    ctx.fillStyle='#ff5555'; ctx.font='8px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText('! MONKEYS ESCAPING !',W/2,56); ctx.globalAlpha=1;
  }
}

// ── Loop ───────────────────────────────────────────────────
function loop() {
  if (!overlayOpen) {
    update();
    ctx.clearRect(0,0,W,H);
    if      (state==='HOME') drawHome();
    else if (state==='GAME') drawGame();
    else if (state==='WIN')  drawWin();
    else                     drawLose();
  }
  requestAnimationFrame(loop);
}

// ============================================================
//  RESPONSIVE CANVAS — scales to fit any screen, keeps 4:3 ratio
// ============================================================
function setupResize() {
  function resize() {
    const maxW = window.innerWidth;
    const maxH = window.innerHeight;
    const scale = Math.min(maxW / W, maxH / H);
    canvas.style.width = Math.floor(W * scale) + 'px';
    canvas.style.height = Math.floor(H * scale) + 'px';
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', resize);
  resize();
}

// ============================================================
//  TOUCH CONTROLS — large semi-transparent LEFT/RIGHT buttons
// ============================================================
const touchState = { left: false, right: false };
function setupTouchControls() {
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (isTouch) document.body.classList.add('touch-controls');
  setBodyState(state);

  const left = document.getElementById('touchLeft');
  const right = document.getElementById('touchRight');

  function bind(el, key) {
    const start = (e) => { e.preventDefault(); touchState[key] = true; el.classList.add('active'); };
    const end   = (e) => { e.preventDefault(); touchState[key] = false; el.classList.remove('active'); };
    el.addEventListener('touchstart', start, { passive: false });
    el.addEventListener('touchend', end, { passive: false });
    el.addEventListener('touchcancel', end, { passive: false });
    // also support mouse for desktop testing
    el.addEventListener('mousedown', start);
    el.addEventListener('mouseup', end);
    el.addEventListener('mouseleave', end);
  }
  bind(left, 'left');
  bind(right, 'right');
}

// ============================================================
//  ORIENTATION HANDLING — suggest landscape on small portrait screens
// ============================================================
function setupOrientationHandling() {
  function check() {
    const isSmall = Math.min(window.innerWidth, window.innerHeight) < 920;
    const isPortrait = window.innerHeight > window.innerWidth;
    if (isSmall && isPortrait && !orientationDismissed) {
      document.body.classList.add('show-orientation-warning');
    } else {
      document.body.classList.remove('show-orientation-warning');
    }
  }
  let orientationDismissed = false;
  document.getElementById('continueAnywayBtn').addEventListener('click', () => {
    orientationDismissed = true;
    document.body.classList.remove('show-orientation-warning');
  });
  window.addEventListener('resize', check);
  window.addEventListener('orientationchange', check);
  check();
}

// ============================================================
//  OLDER GAMES — memory carousel (auto-slide, arrows, swipe)
// ============================================================
let carouselIndex = 0;
let carouselTimer = null;
function setupCarousel() {
  const track = document.getElementById('carouselTrack');
  track.innerHTML = '';
  if (memories.length === 0) {
    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.innerHTML = '<div class="placeholder">Add image filenames to the<br>"memories" array in the code<br>to fill this carousel.</div>';
    track.appendChild(slide);
  } else {
    memories.forEach(src => {
      const slide = document.createElement('div');
      slide.className = 'slide';
      const img = document.createElement('img');
      img.src = src;
      img.alt = 'memory';
      img.onerror = () => { slide.innerHTML = '<div class="placeholder">Missing image:<br>' + src + '</div>'; };
      slide.appendChild(img);
      track.appendChild(slide);
    });
  }

  document.getElementById('carouselPrev').addEventListener('click', () => goToSlide(carouselIndex - 1));
  document.getElementById('carouselNext').addEventListener('click', () => goToSlide(carouselIndex + 1));
  document.getElementById('closeOlderGames').addEventListener('click', closeOlderGames);

  // Swipe gestures (mobile)
  const container = document.getElementById('carouselContainer');
  let touchStartX = 0;
  container.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  container.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) goToSlide(carouselIndex + (dx < 0 ? 1 : -1));
  }, { passive: true });
}

function goToSlide(i) {
  const count = Math.max(1, memories.length);
  carouselIndex = (i + count) % count;
  document.getElementById('carouselTrack').style.transform = `translateX(-${carouselIndex * 100}%)`;
  // Swap the tagline to match the current picture (see "taglines" array above)
  const taglineEl = document.getElementById('carouselTagline');
  if (taglineEl) taglineEl.textContent = taglines[carouselIndex] || DEFAULT_TAGLINE;
  restartCarouselAutoplay();
}

function restartCarouselAutoplay() {
  if (carouselTimer) clearInterval(carouselTimer);
  carouselTimer = setInterval(() => goToSlide(carouselIndex + 1), 3000);
}

function openOlderGames() {
  document.getElementById('olderGamesOverlay').classList.add('open');
  overlayOpen = true; // pauses the game loop / ambient music while open
  carouselIndex = 0;
  goToSlide(0);
}

function closeOlderGames() {
  document.getElementById('olderGamesOverlay').classList.remove('open');
  overlayOpen = false;
  if (carouselTimer) clearInterval(carouselTimer);
}

init();
